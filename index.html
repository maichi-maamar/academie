<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carte Joueur Académie Football Premium</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#0f172a,#1d4ed8,#60a5fa);
    color: white;
}

.container {
    max-width: 430px;
    margin: auto;
    padding: 20px;
}

.konami-card {
    background: linear-gradient(160deg,#111827,#2563eb,#60a5fa);
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.4);
    position: relative;
}

.badge-label {
    position: absolute;
    top: 15px;
    right: 15px;
    background: gold;
    color: black;
    padding: 6px 12px;
    border-radius: 8px;
    font-weight: bold;
}

.player-photo {
    width: 100%;
    height: 260px;
    object-fit: cover;
    border-radius: 15px;
    margin-bottom: 15px;
    border: 3px solid rgba(255,255,255,0.2);
}

.player-name {
    text-align: center;
    font-size: 28px;
    font-weight: bold;
    margin-bottom: 15px;
}

.section {
    background: rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 15px;
    margin-top: 15px;
}

.section p {
    margin: 7px 0;
}

.footer {
    text-align: center;
    margin-top: 20px;
    font-size: 14px;
}

a {
    color: #facc15;
    text-decoration: none;
    font-weight: bold;
}

#msg {
    text-align: center;
    margin-top: 15px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

    <div class="konami-card">

        <div class="badge-label" id="badge">BADGE</div>

        <!-- Photo dynamique -->
        <img id="photo"
             class="player-photo"
             src="https://via.placeholder.com/400x500?text=Photo+Joueur"
             alt="Photo joueur"
             onerror="this.src='https://via.placeholder.com/400x500?text=Photo+Indisponible';">

        <div class="player-name" id="fullName">Chargement...</div>

        <div class="section">
            <p><strong>Âge :</strong> <span id="age"></span></p>
            <p><strong>Poids :</strong> <span id="poids"></span></p>
            <p><strong>Catégorie :</strong> <span id="categorie"></span></p>
            <p><strong>Poste :</strong> <span id="poste"></span></p>
            <p><strong>Emplacement :</strong> <span id="emplacement"></span></p>
            <p><strong>Saison :</strong> <span id="saison"></span></p>
        </div>

        <div class="section">
            <p><strong>Coach :</strong> <span id="coach"></span></p>
            <p><strong>Téléphone :</strong> <a id="telephone"></a></p>
            <p><strong>Facebook :</strong> <a id="facebook" target="_blank">Page officielle</a></p>
        </div>

    </div>

    <div id="msg"></div>

    <div class="footer">
        Carte officielle Académie Football Premium
    </div>

</div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz9rNE6ckhVMF8nBYx63EpbZWw7vCWetZKNd7TUQDfEqLlapnje8BIUmxTghNk1zMg7rQ/exec";

// Lecture dynamique de l'URL
const urlParams = new URLSearchParams(window.location.search);
const playerId = urlParams.get("player_id") || "100";

// Chargement auto
window.onload = function() {
    loadPlayer(playerId);
};

// Récupération données Google Sheets
function loadPlayer(playerId) {

    fetch(`${SCRIPT_URL}?player_id=${playerId}`)
        .then(response => response.json())
        .then(data => {

            console.log(data);

            if (data.status === "OK") {
                updateCard(data);
            } else {
                msg("Joueur introuvable", "red");
            }

        })
        .catch(error => {

            console.error(error);
            msg("Erreur de connexion", "red");

        });
}

// Mise à jour carte complète
function updateCard(data) {

    // Photo dynamique sécurisée
    const photoElement = document.getElementById("photo");

    if (data.photo && data.photo.trim() !== "") {
        photoElement.src = data.photo;
    } else {
        photoElement.src =
            "https://via.placeholder.com/400x500?text=Photo+Joueur";
    }

    document.getElementById("fullName").innerText =
        data.nom + " " + data.prenom;

    document.getElementById("age").innerText =
        data.age + " ans";

    document.getElementById("poids").innerText =
        data.poids + " kg";

    document.getElementById("categorie").innerText =
        data.categorie;

    document.getElementById("poste").innerText =
        data.poste;

    document.getElementById("emplacement").innerText =
        data.emplacement;

    document.getElementById("saison").innerText =
        data.saison;

    document.getElementById("coach").innerText =
        data.coach;

    // Téléphone dynamique
    document.getElementById("telephone").innerText =
        data.telephone;

    document.getElementById("telephone").href =
        "tel:" + data.telephone;

    // Facebook dynamique
    document.getElementById("facebook").href =
        data.facebook;

    // Badge dynamique
    document.getElementById("badge").innerText =
        data.badge;
}

// Messages
function msg(text, color) {

    const m = document.getElementById("msg");

    m.innerText = text;
    m.style.color = color;
}

</script>

</body>
</html>
