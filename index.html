<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carte NFC Académie Football</title>
<style>
body {
    margin: 0;
    font-family: 'Arial', sans-serif;
    background: linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
    color: white;
}
    .container {
    max-width: 430px;
    margin: auto;
    padding: 15px;
}
    .konami-card {
    background: linear-gradient(160deg,#111827,#1d4ed8,#60a5fa);
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.45);
    position: relative;
    overflow: hidden;
}
.badge-label {
    position: absolute;
    top: 15px;
    right: 15px;
    background: gold;
    color: black;
    padding: 6px 10px;
    border-radius: 8px;
    font-weight: bold;
}

.player-photo {
    width: 100%;
    height: 250px;
    object-fit: cover;
    border-radius: 15px;
    margin-bottom: 15px;
}
    .player-name {
    font-size: 28px;
    font-weight: bold;
    text-align: center;
}

.player-info p {
    margin: 6px 0;
    font-size: 15px;
}

.section {
    background: rgba(255,255,255,0.1);
    padding: 15px;
    border-radius: 12px;
    margin-top: 15px;
}
.scan-btn {
    width: 100%;
    padding: 15px;
    margin-top: 20px;
    border: none;
    border-radius: 12px;
    background: #22c55e;
    color: white;
    font-size: 18px;
    cursor: pointer;
    font-weight: bold;
}

#msg {
    text-align: center;
    margin-top: 15px;
    font-size: 18px;
    font-weight: bold;
}
a { color: #facc15; }
</style>
</head>
<body>

<div class="container">
    <div class="konami-card" id="playerCard">
        <div class="badge-label" id="badge">NFC BADGE</div>
        <img id="photo" class="player-photo" src="" alt="Photo joueur">
        <div class="player-name" id="fullName">Scan NFC</div>
          <div class="section player-info">
            <p><strong>Âge :</strong> <span id="age"></span></p>
            <p><strong>Poids :</strong> <span id="poids"></span></p>
            <p><strong>Catégorie :</strong> <span id="categorie"></span></p>
            <p><strong>Poste :</strong> <span id="poste"></span></p>
            <p><strong>Emplacement :</strong> <span id="emplacement"></span></p>
            <p><strong>Saison :</strong> <span id="saison"></span></p>
        </div>

        <div class="section">
            <p><strong>Coach :</strong> <span id="coach"></span></p>
            <p><strong>Téléphone :</strong> <a id="telephone" href="#"></a></p>
            <p><strong>Facebook :</strong> <a id="facebook" target="_blank">Page officielle</a></p>
        </div>
    </div>

    <button class="scan-btn" onclick="scanNFC()">Scanner Badge NFC</button>
    <div id="msg"></div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyxXEyz9NYpqvBv46kI5LNMkfdHFfkiPPTchfCl5vexzNXNJTeqersI83sKQSvxT0fHdg/exec";

function getReaderID() {
    let id = localStorage.getItem("READER_ID");
    if (!id) {
        id = "READER-" + Math.random().toString(36).substr(2,8);
        localStorage.setItem("READER_ID", id);
    }
    return id;
}
    async function scanNFC() {
    try {
        const reader = new NDEFReader();
        await reader.scan();

        msg("Scan en cours...", "yellow");

        reader.onreading = event => {
            const uid = event.serialNumber;
            fetchPlayer(uid);
            navigator.vibrate(200);
        };
    } catch (error) {
        msg("NFC non supporté sur cet appareil", "red");
    }
}

function fetchPlayer(uid) {
    const reader = getReaderID();

    fetch(`${SCRIPT_URL}?uid=${uid}&reader=${reader}`)
        .then(res => res.json())
        .then(data => {
            if (data.status === "OK") {
                updateCard(data);
                msg(`✔ Présence validée : ${data.nom} ${data.prenom}`, "lightgreen");
            } else {
                msg("✖ Badge refusé", "red");
            }
        });
}
    function updateCard(data) {
    document.getElementById("photo").src = data.photo;
    document.getElementById("fullName").innerText = data.nom + " " + data.prenom;
    document.getElementById("age").innerText = data.age + " ans";
    document.getElementById("poids").innerText = data.poids + " kg";
    document.getElementById("categorie").innerText = data.categorie;
    document.getElementById("poste").innerText = data.poste;
    document.getElementById("emplacement").innerText = data.emplacement;
    document.getElementById("saison").innerText = data.saison;
    document.getElementById("coach").innerText = data.coach;
    document.getElementById("telephone").innerText = data.telephone;
    document.getElementById("telephone").href = "tel:" + data.telephone;
    document.getElementById("facebook").href = data.facebook;
    document.getElementById("badge").innerText = data.badge;
}

function msg(text, color) {
    const m = document.getElementById("msg");
    m.innerText = text;
    m.style.color = color;
}
</script>

</body>
</html>
