<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carte Joueur Académie Football Premium</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#0f172a,#1d4ed8,#60a5fa);
    color: white;
}

.container {
    max-width: 430px;
    margin: auto;
    padding: 20px;
}

.konami-card {
    background: linear-gradient(160deg,#111827,#2563eb,#60a5fa);
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.4);
    position: relative;
}

.badge-label {
    position: absolute;
    top: 15px;
    right: 15px;
    background: gold;
    color: black;
    padding: 6px 12px;
    border-radius: 8px;
    font-weight: bold;
}

.player-photo {
    width: 100%;
    height: 260px;
    object-fit: cover;
    border-radius: 15px;
    margin-bottom: 15px;
    border: 3px solid rgba(255,255,255,0.2);
}

.player-name {
    text-align: center;
    font-size: 28px;
    font-weight: bold;
    margin-bottom: 15px;
}

.section {
    background: rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 15px;
    margin-top: 15px;
}

.section p {
    margin: 7px 0;
}

.footer {
    text-align: center;
    margin-top: 20px;
    font-size: 14px;
}

a {
    color: #facc15;
    text-decoration: none;
    font-weight: bold;
}

#msg {
    text-align: center;
    margin-top: 15px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

    <div class="konami-card">

        <div class="badge-label" id="badge">BADGE</div>

        <img id="photo"
             class="player-photo"
             src="https://via.placeholder.com/400x500?text=Photo+Joueur"
             alt="Photo joueur">

        <div class="player-name" id="fullName">Chargement...</div>

        <div class="section">
            <p><strong>Âge :</strong> <span id="age"></span></p>
            <p><strong>Poids :</strong> <span id="poids"></span></p>
            <p><strong>Catégorie :</strong> <span id="categorie"></span></p>
            <p><strong>Poste :</strong> <span id="poste"></span></p>
            <p><strong>Emplacement :</strong> <span id="emplacement"></span></p>
            <p><strong>Saison :</strong> <span id="saison"></span></p>
        </div>

        <div class="section">
            <p><strong>Coach :</strong> <span id="coach"></span></p>
            <p><strong>Téléphone :</strong> <a id="telephone"></a></p>
            <p><strong>Facebook :</strong> <a id="facebook" target="_blank">Page officielle</a></p>
        </div>

    </div>

    <div id="msg"></div>

    <div class="footer">
        Carte officielle Académie Football Premium
    </div>

</div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxkSOZ94_A8Z9x6E8wtzseepHLn_NRLgMTu1-lqrp4Xlr8qM3el2bAofVF6UxXC6vMkLg/exec";

const urlParams = new URLSearchParams(window.location.search);
const playerId = urlParams.get("player_id") || "100";

window.onload = () => loadPlayer(playerId);

function loadPlayer(playerId) {

    fetch(`${SCRIPT_URL}?player_id=${playerId}`)
        .then(r => {
            if (!r.ok) throw new Error("HTTP " + r.status);
            return r.json();
        })
        .then(data => {

            console.log(data);

            if (data.status === "OK") {
                updateCard(data);
            } else {
                msg("Joueur introuvable", "red");
            }

        })
        .catch(err => {
            console.error(err);
            msg("Erreur de chargement API", "red");
        });
}

function updateCard(data) {

    // PHOTO dynamique sécurisée
    document.getElementById("photo").src =
        (data.photo && data.photo.trim() !== "")
        ? data.photo
        : "https://via.placeholder.com/400x500?text=Photo";

    document.getElementById("fullName").innerText =
        (data.nom || "") + " " + (data.prenom || "");

    document.getElementById("age").innerText =
        data.age || "";

    document.getElementById("poids").innerText =
        data.poids || "";

    document.getElementById("categorie").innerText =
        data.categorie || "";

    document.getElementById("poste").innerText =
        data.poste || "";

    document.getElementById("emplacement").innerText =
        data.emplacement || "";

    document.getElementById("saison").innerText =
        data.saison || "";

    document.getElementById("coach").innerText =
        data.coach || "";

    // TELEPHONE
    document.getElementById("telephone").innerText =
        data.telephone || "";

    document.getElementById("telephone").href =
        "tel:" + (data.telephone || "");

    
    // FACEBOOK
    document.getElementById("facebook").href =
        data.facebook || "#";

    // BADGE
    document.getElementById("badge").innerText =
        data.badge || "PLAYER";
}

function msg(text, color) {
    const m = document.getElementById("msg");
    m.innerText = text;
    m.style.color = color;
}

</script>

</body>
</html>
